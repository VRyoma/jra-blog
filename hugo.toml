baseURL = "https://aikeiba.vvil.jp"
languageCode = "ja"
title = "AI競馬予想 | aikeiba"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[params]
  author = "りょうま"
  description = "AIが毎週自動生成するJRA重賞予想。G1・G2・G3の全重賞をデータ分析でカバー。"
  defaultTheme = "auto"
  DateFormat = "2006年1月2日"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  homeInfoParams = { Title = "🤖 AI競馬予想 — aikeiba", Content = "毎週金曜日、AIが今週末の重賞レースを自動分析・予想。G1・G2・G3の全重賞をカバー。データと過去傾向をもとに本命・対抗・買い目まで提示します。" }

  [params.assets]
    favicon = "/images/favicon.ico"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "ホーム"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "posts"
    name = "予想一覧"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "タグ"
    url = "/tags/"
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
